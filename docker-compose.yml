services:
  tcc-monitor:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TCC_USERNAME=${TCC_USERNAME}
      - TCC_PASSWORD=${TCC_PASSWORD}
      - TCC_DEVICE_ID=${TCC_DEVICE_ID}
      - POLL_INTERVAL=${POLL_INTERVAL:-10m}
      - DB_PATH=/data/tcc-monitor.db
      - TZ=America/Edmonton
      - APP_TITLE=${APP_TITLE:-TCC Monitor}
      - MATRIX_HOMESERVER=${MATRIX_HOMESERVER:-}
      - MATRIX_USERNAME=${MATRIX_USERNAME:-}
      - MATRIX_PASSWORD=${MATRIX_PASSWORD:-}
      - MATRIX_ROOM_ID=${MATRIX_ROOM_ID:-}
      - MATRIX_PICKLE_KEY=${MATRIX_PICKLE_KEY:-tcc-monitor}
    volumes:
      - tcc-data:/data
    restart: unless-stopped

volumes:
  tcc-data:
