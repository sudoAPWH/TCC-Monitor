services:
  tcc-monitor:
    build: .
    ports:
      - "8080:8080"
    environment:
      - TCC_USERNAME=${TCC_USERNAME}
      - TCC_PASSWORD=${TCC_PASSWORD}
      - TCC_DEVICE_ID=${TCC_DEVICE_ID}
      - POLL_INTERVAL=${POLL_INTERVAL:-10m}
      - DB_PATH=/data/tcc-monitor.db
      - TZ=America/Edmonton
    volumes:
      - tcc-data:/data
    restart: unless-stopped

volumes:
  tcc-data:
